<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業モニター ロック</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
    width: 280px;
    background: #0f172a;
    color: #e2e8f0;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1e293b;
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .title { font-size: 14px; font-weight: 700; }
  .subtitle { font-size: 10px; color: #64748b; }

  .status-card {
    background: #1e293b;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .status-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #64748b;
    flex-shrink: 0;
  }
  .status-dot.active {
    background: #ef4444;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.25);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .status-label {
    font-size: 13px; font-weight: 700;
  }
  .status-detail {
    font-size: 11px; color: #64748b; line-height: 1.5;
  }
  .session-id {
    font-family: monospace;
    font-size: 10px;
    color: #3b82f6;
    word-break: break-all;
    margin-top: 4px;
  }

  .lock-features {
    background: #1e293b;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .lock-features h3 {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
  }
  .feature-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    padding: 4px 0;
    color: #94a3b8;
  }
  .feature-item.on { color: #e2e8f0; }
  .feature-icon { font-size: 14px; width: 18px; text-align: center; }

  .footer {
    font-size: 10px;
    color: #334155;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔒</div>
  <div>
    <div class="title">授業モニター ロック</div>
    <div class="subtitle">Chromebook 授業管理システム</div>
  </div>
</div>

<div class="status-card">
  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-label" id="status-label">待機中</div>
  </div>
  <div class="status-detail" id="status-detail">
    先生が授業を開始するとロックが自動的に有効になります。
  </div>
  <div class="session-id" id="session-id"></div>
</div>

<div class="lock-features">
  <h3>ロック機能</h3>
  <div class="feature-item" id="feat-newtab">
    <span class="feature-icon">🚫</span>
    <span>新しいタブを開けない</span>
  </div>
  <div class="feature-item" id="feat-switch">
    <span class="feature-icon">🔄</span>
    <span>他のタブに切り替えられない</span>
  </div>
  <div class="feature-item" id="feat-close">
    <span class="feature-icon">📌</span>
    <span>授業タブを閉じられない</span>
  </div>
  <div class="feature-item" id="feat-session">
    <span class="feature-icon">⏱</span>
    <span>セッション終了で自動解除</span>
  </div>
</div>

<div class="footer">
  授業終了まで操作は制限されます
</div>

<script src="popup.js"></script>
</body>
</html>
