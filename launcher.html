<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業モニター 起動中...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: linear-gradient(135deg, #1e3a5f, #0f172a);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card { text-align: center; max-width: 400px; width: 100%; }
  .icon { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
  .sub { font-size: 14px; opacity: .75; margin-bottom: 28px; line-height: 1.8; }
  .launch-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px 24px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
    box-shadow: 0 6px 24px rgba(37,99,235,.4);
    transition: transform .15s, box-shadow .15s;
    margin-bottom: 16px;
  }
  .launch-btn:active { transform: scale(.97); }
  .note { font-size: 12px; opacity: .6; line-height: 1.7; margin-top: 8px; }
  .error-box {
    display: none;
    margin-top: 20px;
    background: rgba(239,68,68,.15);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #fca5a5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📲</div>
  <h1 id="title">授業モニターを開く</h1>
  <p class="sub" id="sub">下のボタンをタップしてPWAアプリを起動してください</p>

  <a id="launch-btn" class="launch-btn" href="#">
    <span>📲</span>
    <span>アプリを起動する</span>
  </a>

  <p class="note">
    ※「授業モニター」がホーム画面にインストールされている必要があります
  </p>

  <div class="error-box" id="error-box">
    アプリが起動しない場合は、ホーム画面の<br>
    <strong>「授業モニター」</strong>アイコンから直接開いてください。
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(location.search);

  if (!params.has('session')) {
    document.getElementById('title').textContent = 'URLが正しくありません';
    document.getElementById('sub').textContent = '先生から正しいURLを送ってもらってください。';
    document.getElementById('launch-btn').style.display = 'none';
    return;
  }

  const customUrl = 'web+classmonitor://?' + params.toString();
  const btn = document.getElementById('launch-btn');
  btn.href = customUrl;

  btn.addEventListener('click', function() {
    setTimeout(function() {
      if (!document.hidden) {
        document.getElementById('error-box').style.display = 'block';
      }
    }, 3000);
  });
})();
</script>
</body>
</html>
